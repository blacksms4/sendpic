<script>
    // 1. 주소와 키 (복사하신 주소와 키를 정확히 넣어주세요)
    const SUPABASE_URL = 'https://mxwsqyzuzkjwjvsuqyvq.supabase.co';
    const SUPABASE_KEY = sb_publishable_OlrVJLidj837H7u0eYxgdw_T8SdBMSF'; // 본인의 ANON KEY

    const _client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function uploadPhoto() {
        const fileInput = document.getElementById('photoInput');
        if (fileInput.files.length === 0) return alert('사진을 선택해주세요.');

        const file = fileInput.files[0];
        // 400 에러 방지: 파일명을 영문/숫자로 강제 변환 (확장자 유지)
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}.${fileExt}`; 

        const { data, error } = await _client.storage
            .from('photos') 
            .upload(fileName, file, {
                cacheControl: '3600',
                upsert: false
            });

        if (error) {
            console.error('에러 상세:', error);
            alert('업로드 실패: ' + error.message);
        } else {
            alert('업로드 성공!');
            loadPhotos();
        }
    }

    async function loadPhotos() {
        const { data, error } = await _client.storage.from('photos').list('', {
            limit: 20,
            sortBy: { column: 'created_at', order: 'desc' }
        });

        if (error) {
            document.getElementById('fileList').innerHTML = "목록 로딩 실패";
            return;
        }

        const listDiv = document.getElementById('fileList');
        listDiv.innerHTML = '';
        
        data.forEach(file => {
            const { data: { publicUrl } } = _client.storage.from('photos').getPublicUrl(file.name);
            listDiv.innerHTML += `
                <div class="img-item">
                    <img src="${publicUrl}" onerror="this.src='https://via.placeholder.com/150?text=Error'">
                    <a href="${publicUrl}" target="_blank" class="download-btn">내려받기</a>
                </div>`;
        });
    }

    window.onload = loadPhotos;
</script>
