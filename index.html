<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>광명동굴 초고속 전송기</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; }
        body { font-family: sans-serif; background: #f4f7f9; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); text-align: center; margin-bottom: 20px; }
        .file-label { display: block; padding: 30px; background: #f8f9fa; border: 2px dashed #ddd; border-radius: 15px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
        button { border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; font-size: 1rem; }
        .btn-send { background: var(--primary); color: white; margin-bottom: 10px; }
        .btn-zip { background: #333; color: white; margin-top: 10px; }
        #listContainer { width: 100%; max-width: 600px; display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .photo-card { position: relative; background: white; padding: 5px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .photo-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; }
        .auto-save-box { margin-top: 10px; font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

    <div class="card">
        <h2>📸 사진 전송 & 일괄 저장</h2>
        <label for="fileInput" class="file-label" id="fileNameDisplay">사진 선택 (클릭)</label>
        <input type="file" id="fileInput" accept="image/*" onchange="updateFileName()" multiple>
        <button class="btn-send" onclick="sendPhoto()" id="sendBtn">서버로 보내기</button>
        
        <div class="auto-save-box">
            <input type="checkbox" id="autoDownload"> PC 자동 다운로드 모드
        </div>
    </div>

    <div style="width: 100%; max-width: 600px;">
        <button class="btn-zip" onclick="downloadAllAsZip()">📦 모든 사진 한꺼번에 저장 (ZIP)</button>
    </div>

    <div id="listContainer"></div>

    <script>
        const SUPABASE_URL = 'https://mxwsqyzuzkjwjvsuqyvq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_OlrVJLidj837H7u0eYxgdw_T8SdBMSF'; 
        const _client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let lastCount = 0;

        function updateFileName() {
            const cnt = document.getElementById('fileInput').files.length;
            document.getElementById('fileNameDisplay').innerText = cnt + "장의 사진 선택됨";
        }

        async function sendPhoto() {
            const files = document.getElementById('fileInput').files;
            if (!files.length) return alert('사진을 선택하세요!');
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;

            for (let i = 0; i < files.length; i++) {
                const fileName = `cave_${Date.now()}_${i}.jpg`;
                btn.innerText = `전송 중 (${i+1}/${files.length})`;
                await _client.storage.from('phtos').upload(fileName, files[i]);
            }
            alert('전송 완료!');
            location.reload();
        }

        async function getPhotos() {
            const { data } = await _client.storage.from('phtos').list('', { limit: 50, sortBy: { column: 'created_at', order: 'desc' } });
            if (!data) return;

            const container = document.getElementById('listContainer');
            const tenMin = Date.now() - (10 * 60 * 1000);
            container.innerHTML = '';
            
            data.forEach(item => {
                if (new Date(item.created_at).getTime() > tenMin) {
                    const { data: { publicUrl } } = _client.storage.from('phtos').getPublicUrl(item.name);
                    container.innerHTML += `<div class="photo-card"><img src="${publicUrl}"></div>`;
                    
                    // PC 자동 다운로드 체크 시 실행
                    if(document.getElementById('autoDownload').checked && data.length > lastCount) {
                        const a = document.createElement('a');
                        a.href = publicUrl;
                        a.download = item.name;
                        a.click();
                    }
                }
            });
            lastCount = data.length;
        }

        // 일괄 ZIP 다운로드 기능
        async function downloadAllAsZip() {
            const zip = new JSZip();
            const { data } = await _client.storage.from('phtos').list();
            if(!data || data.length === 0) return alert("저장할 사진이 없습니다.");

            const btn = document.querySelector('.btn-zip');
            btn.innerText = "압축 중... 잠시만 기다리세요";

            for (const item of data) {
                const { data: blob } = await _client.storage.from('phtos').download(item.name);
                zip.file(item.name, blob);
            }

            const content = await zip.generateAsync({type:"blob"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(content);
            a.download = `광명동굴_사진_${Date.now()}.zip`;
            a.click();
            btn.innerText = "📦 모든 사진 한꺼번에 저장 (ZIP)";
        }

        getPhotos();
        setInterval(getPhotos, 5000); // 5초마다 자동 갱신
    </script>
</body>
</html>
